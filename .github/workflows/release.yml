name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 25.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [ -z "$TAG" ]; then
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build executor
        run: bun run build:executor

      - name: Validate runtime payload
        run: bun run validate:runtime

      - name: Build release package
        run: bun run package:release

      - name: Write release notes
        run: |
          cat > release/RELEASE_NOTES.md <<'NOTES'
          LazyCodex AI Lite runtime package.

          Install:

          curl -fsSL https://raw.githubusercontent.com/alexzhang1030/lazycodex-ai-lite/main/scripts/install.sh | sh

          This release is distributed through GitHub Releases only.
          NOTES

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            release/lazycodex-ai-lite.tar.gz \
            release/lazycodex-ai-lite.tar.gz.sha256 \
            --target "$GITHUB_SHA" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file release/RELEASE_NOTES.md
